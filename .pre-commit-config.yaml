repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict    # block on merge markers
        fail_fast: true
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: ^\.vscode/         # .vscode/*.json is JSONC
      - id: check-toml

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.23.0
    hooks:
      - id: markdownlint-cli2       # lint + autofix markdown
        args: [--fix]

  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format            # format TOML
        types: [toml]

  - repo: https://github.com/maxwinterstein/shfmt-py
    rev: v4.0.0
    hooks:
      - id: shfmt                   # format shell
        args: [-w, -i, '2', -ci, -bn]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck              # lint shell (read-only, after shfmt)

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check              # lint + autofix first
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format             # format last, so it owns final layout

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.411
    hooks:
      - id: pyright                 # ruff lints; pyright type-checks
