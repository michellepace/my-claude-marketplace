gitignore: true

# Disable rules
config:
  default: true # Enable all rules by default
  MD013: false  # don't enforce a maximum line length
  MD022: false  # don't require blank lines around headings
  MD024: false  # don't forbid duplicate heading content
  MD028: false  # don't forbid blank lines between blockquotes
  MD031: false  # don't require blank lines around code blocks
  MD032: false  # don't require blank lines around lists
  MD033: false  # don't forbid inline HTML
  MD034: false  # don't forbid bare URLs
  MD036: false  # don't forbid emphasis instead of a heading
  MD040: false  # don't require language on fenced code blocks
  MD041: false  # don't require first line to be H1 heading
  MD046: false  # don't enforce consistent code block style
  MD060: false  # don't require consistent table pipe spacing
