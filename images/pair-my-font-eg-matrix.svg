<text x="400" y="218" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(61, 61, 58)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="12px" font-weight="400" opacity=".35" stroke-width="1px" text-anchor="middle">e.g. Bodoni Moda</text>
