<text x="220" y="118" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(61, 61, 58)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="12px" font-weight="400" opacity=".35" stroke-width="1px" text-anchor="middle">e.g. Minerva Modern</text>
<text x="220" y="440" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(61, 61, 58)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="12px" font-weight="400" opacity=".35" stroke-width="1px" text-anchor="middle">e.g. Bitter</text>
<text x="400" y="440" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(61, 61, 58)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="12px" font-weight="400" opacity=".35" stroke-width="1px" text-anchor="middle">e.g. Zilla Slab</text>
<text x="560" y="440" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(61, 61, 58)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="12px" font-weight="400" opacity=".35" stroke-width="1px" text-anchor="middle">e.g. Memphis</text>
<text x="400" y="118" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(61, 61, 58)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="12px" font-weight="400" opacity=".35" stroke-width="1px" text-anchor="middle">e.g. Arya</text>
<text x="560" y="118" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(61, 61, 58)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="12px" font-weight="400" opacity=".35" stroke-width="1px" text-anchor="middle">e.g. Tenor Sans</text>
</svg>
