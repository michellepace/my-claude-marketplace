<rect width="680" height="560" fill="#fff"/>
<!-- Row headers that may overlap the x=120 grid line -->
<rect x="25" y="84" width="69" height="22" rx="2"/>
<rect x="40" y="100" width="41" height="22" rx="2"/>
<rect x="1" y="118" width="118" height="19" rx="2"/>
<rect x="25" y="194" width="69" height="22" rx="2"/>
<rect x="40" y="210" width="41" height="22" rx="2"/>
<rect x="-2" y="228" width="124" height="19" rx="2"/>
<rect x="35" y="304" width="51" height="22" rx="2"/>
<rect x="40" y="320" width="41" height="22" rx="2"/>
<rect x="7" y="338" width="107" height="19" rx="2"/>
<rect x="35" y="404" width="51" height="22" rx="2"/>
<rect x="40" y="420" width="41" height="22" rx="2"/>
<rect x="4" y="438" width="112" height="19" rx="2"/>
</mask>
<marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
<path d="M0,1 L10,5 L0,9 z" fill="#1d9e75" opacity=".6"/>
</marker>
<marker id="arrow-purple" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
<path d="M0,1 L10,5 L0,9 z" fill="#7f77dd" opacity=".6"/>
</marker>
</defs>

<rect width="680" height="560" fill="#fafaf9" rx="4"/>

<!-- Column headers -->
<text x="220" y="32" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(100, 100, 97)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="14px" font-weight="400" stroke-width="1px" text-anchor="middle">Dynamic</text>
<text x="220" y="48" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(100, 100, 97)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="12px" font-weight="400" stroke-width="1px" text-anchor="middle">open, diagonal</text>
<text x="400" y="32" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(100, 100, 97)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="14px" font-weight="400" stroke-width="1px" text-anchor="middle">Rational</text>
<text x="400" y="48" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(100, 100, 97)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="12px" font-weight="400" stroke-width="1px" text-anchor="middle">closed, vertical</text>
<text x="560" y="32" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(100, 100, 97)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="14px" font-weight="400" stroke-width="1px" text-anchor="middle">Geometric</text>
<text x="560" y="48" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(100, 100, 97)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="12px" font-weight="400" stroke-width="1px" text-anchor="middle">circular, constructed</text>

<!-- Row headers -->
<text x="60" y="100" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(100, 100, 97)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="14px" font-weight="400" stroke-width="1px" text-anchor="middle">Contrast</text>
<text x="60" y="116" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(100, 100, 97)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="14px" font-weight="400" stroke-width="1px" text-anchor="middle">sans</text>
<text x="60" y="132" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(100, 100, 97)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="12px" font-weight="400" stroke-width="1px" text-anchor="middle">thick-thin strokes</text>

<text x="60" y="210" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(100, 100, 97)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="14px" font-weight="400" stroke-width="1px" text-anchor="middle">Contrast</text>
<text x="60" y="226" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(100, 100, 97)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="14px" font-weight="400" stroke-width="1px" text-anchor="middle">serif</text>
<text x="60" y="242" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(100, 100, 97)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="12px" font-weight="400" stroke-width="1px" text-anchor="middle">thick-thin strokes</text>

<text x="60" y="320" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(100, 100, 97)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="14px" font-weight="400" stroke-width="1px" text-anchor="middle">Linear</text>
<text x="60" y="336" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(100, 100, 97)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="14px" font-weight="400" stroke-width="1px" text-anchor="middle">sans</text>
<text x="60" y="352" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(100, 100, 97)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="12px" font-weight="400" stroke-width="1px" text-anchor="middle">uniform strokes</text>

<text x="60" y="420" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(100, 100, 97)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="14px" font-weight="400" stroke-width="1px" text-anchor="middle">Linear</text>
<text x="60" y="436" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(100, 100, 97)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="14px" font-weight="400" stroke-width="1px" text-anchor="middle">serif</text>
<text x="60" y="452" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(100, 100, 97)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="12px" font-weight="400" stroke-width="1px" text-anchor="middle">uniform strokes</text>

<!-- Grid lines -->
<line x1="120" x2="640" y1="60" y2="60" color="rgb(0, 0, 0)" dominant-baseline="auto" opacity=".5" stroke="rgba(31, 30, 29, 0.5)" stroke-width=".75px"/>
<line x1="120" x2="640" y1="160" y2="160" color="rgb(0, 0, 0)" dominant-baseline="auto" opacity=".5" stroke="rgba(31, 30, 29, 0.5)" stroke-width=".75px"/>
<line x1="120" x2="640" y1="270" y2="270" color="rgb(0, 0, 0)" dominant-baseline="auto" opacity=".5" stroke="rgba(31, 30, 29, 0.5)" stroke-width=".75px"/>
<line x1="120" x2="640" y1="380" y2="380" color="rgb(0, 0, 0)" dominant-baseline="auto" opacity=".5" stroke="rgba(31, 30, 29, 0.5)" stroke-width=".75px"/>
<line x1="120" x2="640" y1="470" y2="470" color="rgb(0, 0, 0)" dominant-baseline="auto" opacity=".5" stroke="rgba(31, 30, 29, 0.5)" stroke-width=".75px"/>
<line x1="120" x2="120" y1="60" y2="470" color="rgb(0, 0, 0)" dominant-baseline="auto" mask="url(#a)" opacity=".5" stroke="rgba(31, 30, 29, 0.5)" stroke-width=".75px"/>
<line x1="310" x2="310" y1="60" y2="470" color="rgb(0, 0, 0)" dominant-baseline="auto" opacity=".5" stroke="rgba(31, 30, 29, 0.5)" stroke-width=".75px"/>
