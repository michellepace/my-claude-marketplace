<line x1="640" x2="640" y1="60" y2="470" color="rgb(0, 0, 0)" dominant-baseline="auto" opacity=".5" stroke="rgba(31, 30, 29, 0.5)" stroke-width=".75px"/>

<!-- Lora — primary (Dynamic, Contrast Serif) -->
<g color="rgb(0, 0, 0)" dominant-baseline="auto" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="16px" font-weight="400">
<rect x="162" y="192" width="116" height="44" rx="8" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="#141413" stroke="#141413" stroke-width="1.5px"/>
<text x="220" y="210" color="rgb(0, 0, 0)" dominant-baseline="central" fill="#ffffff" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="14px" font-weight="500" stroke-width="1px" text-anchor="middle">Lora</text>
<text x="220" y="226" color="rgb(0, 0, 0)" dominant-baseline="central" fill="#ffffff" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="12px" font-weight="400" stroke-width="1px" text-anchor="middle">primary</text>
</g>

<!-- Source Sans 3 (Dynamic, Linear Sans) -->
<g color="rgb(0, 0, 0)" dominant-baseline="auto" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="16px" font-weight="400">
<rect x="162" y="302" width="116" height="44" rx="8" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="#e1f5ee" stroke="#0f6e56" stroke-width="1.5px"/>
<text x="220" y="320" color="rgb(0, 0, 0)" dominant-baseline="central" fill="rgb(8, 80, 65)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="14px" font-weight="500" stroke-width="1px" text-anchor="middle">Source Sans 3</text>
<text x="220" y="336" color="rgb(0, 0, 0)" dominant-baseline="central" fill="rgb(15, 110, 86)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="12px" font-weight="400" stroke-width="1px" text-anchor="middle">harmonious</text>
</g>

<!-- Archivo (Rational, Linear Sans) -->
<g color="rgb(0, 0, 0)" dominant-baseline="auto" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="16px" font-weight="400">
<rect x="342" y="302" width="116" height="44" rx="8" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="#eeedfe" stroke="#534ab7" stroke-width="1.5px"/>
<text x="400" y="320" color="rgb(0, 0, 0)" dominant-baseline="central" fill="rgb(60, 52, 137)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="14px" font-weight="500" stroke-width="1px" text-anchor="middle">Archivo</text>
<text x="400" y="336" color="rgb(0, 0, 0)" dominant-baseline="central" fill="rgb(83, 74, 183)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="12px" font-weight="400" stroke-width="1px" text-anchor="middle">contrasting</text>
</g>

<!-- Jost (Geometric, Linear Sans) -->
<g color="rgb(0, 0, 0)" dominant-baseline="auto" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="16px" font-weight="400">
<rect x="502" y="302" width="116" height="44" rx="8" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="#eeedfe" stroke="#534ab7" stroke-width="1.5px"/>
<text x="560" y="320" color="rgb(0, 0, 0)" dominant-baseline="central" fill="rgb(60, 52, 137)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="14px" font-weight="500" stroke-width="1px" text-anchor="middle">Jost</text>
<text x="560" y="336" color="rgb(0, 0, 0)" dominant-baseline="central" fill="rgb(83, 74, 183)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="12px" font-weight="400" stroke-width="1px" text-anchor="middle">contrasting</text>
</g>

<!-- Pairing lines (solid with arrowheads, edge-to-edge) -->
<!-- Lora bottom-center → Source Sans 3 top-center (vertical — harmonious) -->
<line x1="220" y1="236" x2="220" y2="302" stroke="#1d9e75" stroke-width="1px" opacity=".6" marker-end="url(#arrow-green)"/>
<!-- Lora bottom-right → Archivo top-left (diagonal — contrasting) -->
<line x1="278" y1="236" x2="342" y2="302" stroke="#7f77dd" stroke-width="1px" opacity=".6" marker-end="url(#arrow-purple)"/>
<!-- Lora bottom-right → Jost top-left (diagonal — contrasting) -->
<line x1="278" y1="236" x2="502" y2="302" stroke="#7f77dd" stroke-width="1px" opacity=".6" marker-end="url(#arrow-purple)"/>

<!-- Legend -->
<circle cx="140" cy="488" r="5" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="#1d9e75" opacity=".7"/>
<text x="150" y="492" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(61, 61, 58)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="12px" font-weight="400" stroke-width="1px">Same column  = harmonious: same bones, different clothes. They feel like family.</text>
<circle cx="140" cy="506" r="5" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="#7f77dd" opacity=".7"/>
<text x="150" y="510" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(61, 61, 58)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="12px" font-weight="400" stroke-width="1px">Diagonal = contrasting: diff bones AND clothes. Clear hierarchy without fighting.</text>
<circle cx="140" cy="524" r="5" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="#e24b4a" opacity=".7"/>
<text x="150" y="528" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(61, 61, 58)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="12px" font-weight="400" stroke-width="1px">Same row  (horizontal) = avoid: not a good choice. Feels &#x201C;off.&#x201D;</text>
<!-- Insight unique to this plot (not a general matrix rule) -->
<circle cx="140" cy="542" r="5" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="#999" opacity=".7"/>
<text x="150" y="546" color="rgb(0, 0, 0)" dominant-baseline="auto" fill="rgb(61, 61, 58)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="12px" font-weight="400" stroke-width="1px">Distance from Lora: Jost contrasts more (dynamic &#x2194; geometric) than Archivo</text>

