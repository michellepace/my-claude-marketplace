# TOOL CONFIGURATION ONLY: Not a Python project — shared ruff/pyright config for standalone PEP 723 scripts.


# TYPE CHECKING (PYRIGHT)
# =================================
[tool.pyright]
typeCheckingMode = "standard" # Keep (not strict!)
pythonVersion = "3.14"
reportUnusedImport = false    # Ruff F401
reportUnusedVariable = false  # Ruff F841
reportDuplicateImport = false # Ruff F811


# LINTING (RUFF)
# =================================
[tool.ruff]
line-length = 90
target-version = "py314"

[tool.ruff.lint]
select = ["ALL"]
ignore = [ # ignore incompatible or overly pedantic rules
  "D100",   # Missing docstring in public module
  "D104",   # Missing docstring in public package
  "D203",   # blank line before class docstring (conflicts with D211)
  "D213",   # multi-line summary starts on line 2 (conflicts with D212)
  "COM812", # Trailing comma missing (conflicts with formatter)
  "ISC001", # implicit string concatenation (conflicts with formatter)
  "T201",   # Print found (allow print statements)
]

[tool.ruff.lint.per-file-ignores]
"plugins/**/scripts/*.py" = ["INP001"] # standalone, not importable package

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.pylint]
max-args = 5
max-branches = 12
max-returns = 6
max-statements = 50

[tool.ruff.lint.mccabe]
max-complexity = 10
